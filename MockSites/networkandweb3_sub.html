<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Application Frame</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 25px; background-color: #ffffff; color: #444; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { background-color: #004b87; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #003666; }
        .disclaimer { font-size: 0.8em; color: #777; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <form onsubmit="event.preventDefault(); alert('Application Submitted!');">
        <div class="grid-2">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="e.g. John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="e.g. Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Social Security Number (Secure)</label>
            <input type="text" placeholder="XXX-XX-XXXX" required>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Requested Loan Amount ($)</label>
                <input type="number" placeholder="5000" required>
            </div>
            <div class="form-group">
                <label>Loan Term</label>
                <select required>
                    <option value="">Select term...</option>
                    <option value="12">12 Months</option>
                    <option value="24">24 Months</option>
                    <option value="36">36 Months</option>
                    <option value="48">48 Months</option>
                </select>
            </div>
        </div>

        <button type="submit">Submit Secure Application</button>
        <p class="disclaimer">By clicking submit, you authorize Apex Credit Union to check your credit profile.</p>
    </form>

    </body>
</html>
