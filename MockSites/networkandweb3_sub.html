<!DOCTYPE html>
<html lang="en">
<head>
        <script async src="https://api.glia.com/salemove_integration.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Application Frame</title>
    <style>
        :root {
            --deep-blue: #002d72;
            --retro-yellow: #ffc82c;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 25px; background-color: #ffffff; color: #444; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: var(--deep-blue); }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 2px solid #ccc; border-radius: 4px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: var(--retro-yellow); outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Retro Button */
        button { background-color: var(--deep-blue); color: white; padding: 12px 20px; border: none; border-radius: 0px; cursor: pointer; font-size: 1em; width: 100%; font-weight: bold; margin-top: 10px; font-family: 'Courier New', Courier, monospace; text-transform: uppercase; letter-spacing: 1px; box-shadow: 4px 4px 0px var(--retro-yellow); transition: transform 0.1s; }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--retro-yellow); }
        
        .disclaimer { font-size: 0.8em; color: #777; margin-top: 25px; text-align: center; }
    </style>
</head>
<body>

    <form onsubmit="event.preventDefault(); alert('Application Submitted! Fetch!');">
        <div class="grid-2">
            <div class="form-group">
                <label>Human First Name</label>
                <input type="text" placeholder="e.g. John" required>
            </div>
            <div class="form-group">
                <label>Human Last Name</label>
                <input type="text" placeholder="e.g. Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Pet Chip ID Number (Secure)</label>
            <input type="text" placeholder="XXX-XX-XXXX" required>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Requested Kibble Amount (Lbs)</label>
                <input type="number" placeholder="5000" required>
            </div>
            <div class="form-group">
                <label>Loan Term</label>
                <select required>
                    <option value="">Select term...</option>
                    <option value="12">12 Dog Months</option>
                    <option value="24">24 Dog Months</option>
                    <option value="36">36 Dog Months</option>
                </select>
            </div>
        </div>

        <button type="submit">Submit Secure Application</button>
        <p class="disclaimer">By clicking submit, you authorize Ruy's 21st Credit Union to check your human's credit profile.</p>
    </form>

</body>
</html>
